<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>নাম — দুঃখ</title>
<meta name="theme-color" content="#0B0A0E" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230B0A0E'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23E8945A'/%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='%23A85431' stroke-width='.8' opacity='.5'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&family=Hind+Siliguri:wght@300;400;500&family=Cormorant+Garamond:wght@400&display=swap" rel="stylesheet" />
<style>
  :root{
    --void:#0B0A0E;--void-deep:#070609;--ash:#26232A;--smoke:#8A8390;--smoke-dim:#5C5866;
    --moon:#E8E3DA;--moon-soft:#C9C3BA;--diya:#E8945A;--diya-bright:#FFC486;--diya-deep:#A85431;
    --serif:'Tiro Bangla',serif;--sans:'Hind Siliguri',system-ui,sans-serif;
    --ease:cubic-bezier(0.16,1,0.3,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--smoke);font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
  #c{position:fixed;inset:0;z-index:1;touch-action:none}
  a.back{position:fixed;top:1.3rem;left:1.5rem;z-index:30;color:var(--smoke-dim);text-decoration:none;font-family:var(--serif);font-size:1.05rem;transition:color .8s}
  a.back:hover{color:var(--diya)}
  #whisper{position:fixed;left:50%;top:14%;transform:translateX(-50%);z-index:20;font-family:var(--serif);font-style:italic;color:var(--smoke-dim);font-size:1.05rem;text-align:center;max-width:80vw;opacity:0;transition:opacity 1s}

  #addbar{position:fixed;left:50%;bottom:1.6rem;transform:translateX(-50%);z-index:25;display:none;gap:.6rem;align-items:center;background:rgba(11,10,14,.55);backdrop-filter:blur(6px);border:1px solid var(--ash);border-radius:2px;padding:.5rem .7rem}
  #addbar.on{display:flex}
  #addbar input{background:none;border:none;color:var(--diya-bright);font-family:var(--serif);font-size:1.1rem;padding:.3rem .5rem;outline:none;width:min(60vw,220px);text-align:center}
  #addbar input::placeholder{color:var(--smoke-dim);font-style:italic}
  #addbar button{background:none;border:1px solid rgba(232,148,90,.35);color:var(--diya);border-radius:1px;padding:.4rem 1rem;font-family:var(--sans);font-size:.8rem;letter-spacing:.14em;cursor:pointer;transition:all .6s}
  #addbar button:hover{border-color:rgba(232,148,90,.7);color:var(--diya-bright)}

  .overlay{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;background:radial-gradient(130% 100% at 50% 46%,#0d0b10,var(--void-deep) 78%);transition:opacity 1.8s var(--ease),visibility 1.8s}
  .overlay.gone{opacity:0;visibility:hidden;pointer-events:none}
  .overlay .in{max-width:600px;display:flex;flex-direction:column;align-items:center;gap:1.5rem;animation:rise 1.8s var(--ease) both}
  @keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .title{font-family:var(--serif);font-size:clamp(3rem,12vw,5.5rem);color:var(--moon);line-height:1;text-shadow:0 0 50px rgba(232,148,90,.16)}
  .epi{font-family:var(--serif);font-style:italic;color:var(--smoke);font-size:clamp(1.05rem,3.3vw,1.28rem);line-height:1.8;max-width:32ch}
  .epi cite{display:block;margin-top:.7rem;font-style:normal;font-size:.72rem;letter-spacing:.26em;text-transform:uppercase;color:var(--smoke-dim)}
  .note{font-size:.82rem;letter-spacing:.05em;color:var(--smoke-dim);max-width:34ch;line-height:1.9}
  .oneline{display:flex;gap:.6rem;align-items:center;margin-top:.4rem}
  .oneline input{background:rgba(10,9,12,.5);border:none;border-bottom:1px solid var(--ash);color:var(--diya-bright);font-family:var(--serif);font-size:clamp(1.3rem,4.5vw,1.8rem);padding:.5rem .6rem;text-align:center;outline:none;width:min(70vw,300px)}
  .oneline input:focus{border-color:var(--diya-deep)}
  .cta{font-family:var(--sans);font-weight:400;font-size:.95rem;letter-spacing:.28em;color:var(--diya);padding:.8rem 1.8rem;border:1px solid rgba(232,148,90,.3);border-radius:1px;cursor:pointer;background:none;transition:all .8s var(--ease)}
  .cta:hover:not(:disabled){border-color:rgba(232,148,90,.7);color:var(--diya-bright)}
  .cta:disabled{opacity:.3;cursor:not-allowed}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <a class="back" href="index.html">← দুঃখ</a>
  <div id="whisper"></div>

  <div id="addbar">
    <input id="more" maxlength="20" placeholder="আরেকটি নাম…" autocomplete="off" spellcheck="false" />
    <button id="more-btn">লেখো</button>
  </div>

  <div class="overlay" id="intro">
    <div class="in">
      <h1 class="title">নাম</h1>
      <p class="epi">“দাঁড়াও, পথিক-বর, জন্ম যদি তব বঙ্গে! তিষ্ঠ ক্ষণকাল!”<cite>মাইকেল মধুসূদন দত্ত · সমাধি-লিপি</cite></p>
      <p class="note">একটি নাম লেখো — যাকে তুমি ভুলে যেতে সবচেয়ে বেশি ভয় পাও।</p>
      <div class="oneline"><input id="first" maxlength="20" placeholder="একটি নাম" autocomplete="off" spellcheck="false" /></div>
      <button class="cta" id="begin" disabled>আলো দাও</button>
      <p class="note" style="color:var(--smoke-dim)">তারপর দেখো — নামটা কীভাবে ধীরে ধীরে মুছে যায় বাকিদের মাঝে। মাউস বোলালে এক মুহূর্তের জন্য আবার জ্বলে ওঠে। ধরে রাখা যায় না।</p>
    </div>
  </div>

<script>
(function(){
  "use strict";
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  var cv=document.getElementById('c'),ctx=cv.getContext('2d'),DPR=Math.min(window.devicePixelRatio||1,2),W,H;
  function resize(){W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';}
  resize();addEventListener('resize',resize);
  var $=function(id){return document.getElementById(id);};

  var KEY='dukkho_names';
  function getStored(){try{return JSON.parse(localStorage.getItem(KEY)||'[]');}catch(_){return [];}}
  function store(list){try{localStorage.setItem(KEY,JSON.stringify(list.slice(-300)));}catch(_){}}
  var seedNames=['মা','বাবা','ঠাকুমা','দাদু','ছোড়দি','যে হাসত','প্রথম বন্ধু','মিনু','রতন','অপু','সেই শিক্ষক','যাকে ভুলে গেছি','নীলা','খোকা','বড়দা','সাবিনা','যে গান গাইত','হারানো নাম','দিদা','রঞ্জু','যে চলে গেছে','ফুলি','মাস্টারমশাই','সেই মেয়েটি','অজানা'];

  var names=[]; // {text,x,y,vx,vy,alpha,target,fresh,mine}
  function mk(text,mine){
    return {text:text,x:Math.random()*innerWidth,y:60+Math.random()*(innerHeight-160),
      vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*3,alpha:mine?1:0.08+Math.random()*0.06,fresh:mine?1:0,mine:!!mine,
      size:16+Math.random()*8};
  }
  function seed(){
    var pool=seedNames.concat(getStored());
    // unique-ish, cap visible
    var seen={},out=[];
    for(var i=pool.length-1;i>=0&&out.length<60;i--){var t=pool[i];if(t&&!seen[t]){seen[t]=1;out.push(t);}}
    names=out.map(function(t){return mk(t,false);});
  }
  seed();

  var mx=-9999,my=-9999,hasPtr=false;
  cv.addEventListener('pointermove',function(e){mx=e.clientX;my=e.clientY;hasPtr=true;});
  cv.addEventListener('pointerleave',function(){hasPtr=false;mx=-9999;my=-9999;});

  var started=false;
  function addName(text,mine){
    text=(text||'').trim();if(!text)return;
    var n=mk(text,mine);n.x=innerWidth/2;n.y=innerHeight/2;names.push(n);
    if(names.length>80)names.shift();
    if(mine){var st=getStored();st.push(text);store(st);showWhisper('তুমি একে আলো দিলে। কিন্তু আলো থাকে না।');}
  }
  var wt;
  function showWhisper(t){var w=$('whisper');w.textContent=t;w.style.opacity='.75';clearTimeout(wt);wt=setTimeout(function(){w.style.opacity='0';},4200);}

  $('first').addEventListener('input',function(){$('begin').disabled=$('first').value.trim().length===0;});
  $('first').addEventListener('keydown',function(e){if(e.key==='Enter'&&$('first').value.trim())begin();});
  $('begin').addEventListener('click',begin);
  function begin(){
    var v=$('first').value.trim();if(!v)return;
    started=true;$('intro').classList.add('gone');$('addbar').classList.add('on');
    addName(v,true);
    setTimeout(function(){showWhisper('মাউস বোলাও — যাকে পারো, একটু আলো দাও।');},5000);
  }
  $('more-btn').addEventListener('click',function(){addName($('more').value,true);$('more').value='';});
  $('more').addEventListener('keydown',function(e){if(e.key==='Enter'){addName($('more').value,true);$('more').value='';}});

  var fontReady=false;
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(function(){fontReady=true;});}
  setTimeout(function(){fontReady=true;},1200);

  var R=140;
  function frame(){
    ctx.clearRect(0,0,W,H);
    ctx.textAlign='center';ctx.textBaseline='middle';
    for(var i=0;i<names.length;i++){
      var n=names[i];
      // drift
      n.x+=n.vx*0.06;n.y+=n.vy*0.06;
      if(n.x<20){n.vx=Math.abs(n.vx);}if(n.x>innerWidth-20){n.vx=-Math.abs(n.vx);}
      if(n.y<50){n.vy=Math.abs(n.vy);}if(n.y>innerHeight-70){n.vy=-Math.abs(n.vy);}
      // target alpha: ghost floor + pointer illumination + fresh
      var ghost=0.07;
      var illum=0;
      if(hasPtr){var dx=n.x-mx,dy=n.y-my,d=Math.hypot(dx,dy);if(d<R){illum=(1-d/R)*0.85;}}
      if(n.fresh>0){n.fresh*=0.992;}
      var target=Math.min(1,ghost+illum+n.fresh*0.9);
      n.alpha+=(target-n.alpha)*0.08;
      // draw
      var a=n.alpha;
      ctx.font='italic '+(n.size*DPR)+'px "Tiro Bangla", serif';
      // glow for bright ones
      if(a>0.4){ctx.shadowColor='rgba(232,148,90,'+(a*0.7)+')';ctx.shadowBlur=18*DPR*a;}
      else{ctx.shadowBlur=0;}
      var warm = n.fresh>0.2 ? '255,196,134' : '232,148,90';
      ctx.fillStyle='rgba('+warm+','+a.toFixed(3)+')';
      ctx.fillText(n.text,n.x*DPR,n.y*DPR);
      ctx.shadowBlur=0;
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
